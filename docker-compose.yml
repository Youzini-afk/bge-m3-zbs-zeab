services:
  model-gateway:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      MODEL_API_KEY: ${MODEL_API_KEY:?MODEL_API_KEY is required}
      PORT: ${PORT:-8080}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_THREADS: ${EMBEDDING_THREADS:-6}
      EMBEDDING_ENGINE: ${EMBEDDING_ENGINE:-torch}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-base}
      RERANK_BATCH_SIZE: ${RERANK_BATCH_SIZE:-8}
      RERANK_THREADS: ${RERANK_THREADS:-4}
      RERANK_ENGINE: ${RERANK_ENGINE:-torch}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - model-cache:/app/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: "${MODEL_CPUS:-10}"
          memory: ${MODEL_MEMORY:-14G}
    restart: unless-stopped

volumes:
  model-cache:
